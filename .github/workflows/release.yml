name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from manifest.json
        id: manifest
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Manifest version: $VERSION"

      - name: Verify tag matches manifest version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          MANIFEST_VERSION=${{ steps.manifest.outputs.version }}
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) doesn't match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi

      - name: Create release zip
        run: |
          zip -r launchdarkly-inspector-v${{ steps.manifest.outputs.version }}.zip \
            manifest.json \
            background.js \
            content.js \
            content-debug.js \
            config.js \
            debug.js \
            injected.js \
            options.html \
            options.js \
            popup.html \
            popup.js \
            icons/ \
            -x "*.git*" "*.DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: launchdarkly-inspector-v${{ steps.manifest.outputs.version }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
