name: Auto Tag on Version Change

on:
  push:
    branches:
      - main
    paths:
      - 'manifest.json'

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get current version from manifest.json
        id: current
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current manifest version: $VERSION"

      - name: Get previous version from manifest.json
        id: previous
        run: |
          git checkout HEAD~1 manifest.json 2>/dev/null || echo "No previous version"
          PREV_VERSION=$(jq -r '.version' manifest.json 2>/dev/null || echo "none")
          echo "version=$PREV_VERSION" >> $GITHUB_OUTPUT
          echo "Previous manifest version: $PREV_VERSION"
          git checkout HEAD manifest.json

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.current.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.current.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.current.outputs.version }} does not exist"
          fi

      - name: Create and push tag
        if: |
          steps.current.outputs.version != steps.previous.outputs.version &&
          steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.current.outputs.version }}" -m "Release v${{ steps.current.outputs.version }}"
          git push origin "v${{ steps.current.outputs.version }}"
          echo "✅ Created and pushed tag v${{ steps.current.outputs.version }}"

      - name: Skip reason
        if: |
          steps.current.outputs.version == steps.previous.outputs.version ||
          steps.check_tag.outputs.exists == 'true'
        run: |
          if [ "${{ steps.current.outputs.version }}" == "${{ steps.previous.outputs.version }}" ]; then
            echo "⏭️ Skipping: Version unchanged (${{ steps.current.outputs.version }})"
          else
            echo "⏭️ Skipping: Tag v${{ steps.current.outputs.version }} already exists"
          fi
