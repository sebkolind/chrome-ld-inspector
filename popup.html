<!DOCTYPE html>
<html class="dark">
<head>
  <meta charset="UTF-8">
  <title>LaunchDarkly Flags</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --background: 0 0% 100%;
      --foreground: 240 10% 3.9%;
      --card: 0 0% 100%;
      --card-foreground: 240 10% 3.9%;
      --popover: 0 0% 100%;
      --popover-foreground: 240 10% 3.9%;
      --primary: 240 5.9% 10%;
      --primary-foreground: 0 0% 98%;
      --secondary: 240 4.8% 95.9%;
      --secondary-foreground: 240 5.9% 10%;
      --muted: 240 4.8% 95.9%;
      --muted-foreground: 240 3.8% 46.1%;
      --accent: 240 4.8% 95.9%;
      --accent-foreground: 240 5.9% 10%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 5.9% 90%;
      --input: 240 5.9% 90%;
      --ring: 240 5.9% 10%;
    }

    .dark {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --card: 240 10% 3.9%;
      --card-foreground: 0 0% 98%;
      --popover: 240 10% 3.9%;
      --popover-foreground: 0 0% 98%;
      --primary: 0 0% 98%;
      --primary-foreground: 240 5.9% 10%;
      --secondary: 240 3.7% 15.9%;
      --secondary-foreground: 0 0% 98%;
      --muted: 240 3.7% 15.9%;
      --muted-foreground: 240 5% 64.9%;
      --accent: 240 3.7% 15.9%;
      --accent-foreground: 0 0% 98%;
      --destructive: 0 62.8% 30.6%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 3.7% 15.9%;
      --input: 240 3.7% 15.9%;
      --ring: 240 4.9% 83.9%;
    }

    html {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      width: 500px;
      height: 600px;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .border {
      border: 1px solid hsl(var(--border));
    }

    /* Header */
    .header {
      padding: 1rem 1rem 0.75rem;
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.025em;
      color: hsl(var(--foreground));
    }

    /* Button - shadcn style */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.375rem;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.15s;
      cursor: pointer;
      border: none;
      outline: none;
    }

    .btn-ghost {
      background: transparent;
      color: hsl(var(--foreground));
      height: 2.25rem;
      width: 2.25rem;
    }

    .btn-ghost:hover {
      background: hsl(var(--accent));
      color: hsl(var(--accent-foreground));
    }

    .btn-ghost:active {
      background: hsl(var(--muted));
    }

    /* Dropdown */
    .dropdown {
      position: relative;
    }

    .dropdown-content {
      position: absolute;
      top: calc(100% + 0.25rem);
      right: 0;
      z-index: 50;
      min-width: 12rem;
      background: hsl(var(--popover));
      border: 1px solid hsl(var(--border));
      border-radius: 0.375rem;
      padding: 0.25rem;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      opacity: 0;
      transform: translateY(-0.5rem);
      pointer-events: none;
      transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
    }

    .dropdown-content.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.625rem;
      font-size: 13px;
      border-radius: 0.25rem;
      cursor: pointer;
      transition: background 0.1s;
    }

    .dropdown-item:hover {
      background: hsl(var(--muted) / 0.5);
    }

    .dropdown-label {
      color: hsl(var(--foreground));
      font-weight: 500;
    }

    .dropdown-separator {
      height: 1px;
      background: hsl(var(--border));
      margin: 0.25rem 0;
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      width: 2.25rem;
      height: 1.25rem;
      background: hsl(var(--input));
      border-radius: 9999px;
      transition: background 0.15s;
      cursor: pointer;
    }

    .switch.checked {
      background: hsl(var(--primary));
    }

    .switch-thumb {
      position: absolute;
      top: 0.125rem;
      left: 0.125rem;
      width: 1rem;
      height: 1rem;
      background: hsl(var(--background));
      border-radius: 9999px;
      transition: transform 0.15s;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
    }

    .switch.checked .switch-thumb {
      transform: translateX(1rem);
    }

    /* Input - shadcn style */
    .input {
      display: flex;
      height: 2.5rem;
      width: 100%;
      border-radius: 0.375rem;
      border: 1px solid hsl(var(--input));
      background: hsl(var(--background));
      padding: 0.5rem 0.75rem;
      font-size: 14px;
      color: hsl(var(--foreground));
      transition: all 0.15s;
    }

    .input:focus {
      outline: none;
      border-color: hsl(var(--ring));
      box-shadow: 0 0 0 2px hsl(var(--ring) / 0.2);
    }

    .input::placeholder {
      color: hsl(var(--muted-foreground));
    }

    .input-wrapper {
      position: relative;
    }

    /* Stats */
    .stats {
      padding: 0.625rem 0 1rem;
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      font-weight: 500;
      letter-spacing: 0.025em;
    }

    .stat {
      display: inline;
      text-transform: uppercase;
    }

    .stat-value {
      color: hsl(var(--foreground));
      font-weight: 600;
      margin-right: 1rem;
    }

    /* Scrollable area */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 0 1rem 0.75rem 1rem;
      padding-right: calc(1rem - 8px);
    }

    .content::-webkit-scrollbar {
      width: 8px;
    }

    .content::-webkit-scrollbar-track {
      background: transparent;
    }

    .content::-webkit-scrollbar-thumb {
      background: hsl(var(--border));
      border-radius: 4px;
    }

    .content::-webkit-scrollbar-thumb:hover {
      background: hsl(var(--muted-foreground) / 0.4);
    }

    .space-y-3 > * + * {
      margin-top: 0.5rem;
    }

    /* Card - shadcn style */
    .card {
      border-radius: 0.5rem;
      border: 1px solid hsl(var(--border));
      background: hsl(var(--card));
      color: hsl(var(--card-foreground));
      transition: all 0.15s;
    }

    .card:hover {
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }

    .card-content {
      padding: 0.75rem;
    }

    /* Flag card specific */
    .flag-card {
      position: relative;
    }

    .flag-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.625rem;
    }

    .flag-name {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      font-weight: 500;
      color: hsl(var(--foreground));
      line-height: 1.4;
      word-break: break-all;
      flex: 1;
    }

    /* Badge - shadcn style */
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 9999px;
      padding: 0 0.625rem;
      height: 1.375rem;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .badge-success {
      background: hsl(142 76% 36% / 0.1);
      color: hsl(142 76% 36%);
    }

    .dark .badge-success {
      background: hsl(142 76% 36% / 0.15);
      color: hsl(142 76% 45%);
    }

    .badge-secondary {
      background: hsl(var(--secondary));
      color: hsl(var(--secondary-foreground));
    }

    .badge-outline {
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      border: 1px solid hsl(var(--border));
    }

    /* Actions row */
    .flag-actions {
      display: flex;
      gap: 0.5rem;
      padding-top: 0.625rem;
      border-top: 1px solid hsl(var(--border));
    }

    .btn-sm {
      height: 1.75rem;
      padding: 0 0.75rem;
      font-size: 12px;
      border-radius: 0.375rem;
      font-weight: 500;
    }

    .btn-secondary {
      background: hsl(var(--secondary));
      color: hsl(var(--secondary-foreground));
    }

    .btn-secondary:hover {
      background: hsl(var(--secondary) / 0.8);
    }

    .btn-outline {
      border: 1px solid hsl(var(--input));
      background: hsl(var(--background));
      color: hsl(var(--foreground));
    }

    .btn-outline:hover {
      background: hsl(var(--accent));
      color: hsl(var(--accent-foreground));
    }


    /* Empty state */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
      text-align: center;
    }

    .empty-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: hsl(var(--foreground));
    }

    .empty-description {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 0.75rem;
      left: 50%;
      transform: translateX(-50%) translateY(-0.5rem);
      z-index: 100;
      background: hsl(var(--foreground));
      color: hsl(var(--background));
      padding: 0.375rem 0.75rem;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 500;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .text-muted {
      color: hsl(var(--muted-foreground));
    }

    a {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <h1 class="title">LaunchDarkly</h1>
      <div class="dropdown">
        <button id="settingsToggle" class="btn btn-ghost" aria-label="Settings" style="font-size: 16px;">
          ⚙
        </button>
        <div id="settingsDropdown" class="dropdown-content">
          <div class="dropdown-item" id="themeToggle">
            <span class="dropdown-label">Dark</span>
            <div class="switch" id="themeSwitch">
              <div class="switch-thumb"></div>
            </div>
          </div>
          <div class="dropdown-item" id="debugToggle">
            <span class="dropdown-label">Debug</span>
            <div class="switch" id="debugSwitch">
              <div class="switch-thumb"></div>
            </div>
          </div>
          <div class="dropdown-separator"></div>
          <div class="dropdown-item" id="configureToggle">
            <span class="dropdown-label">Configure</span>
          </div>
        </div>
      </div>
    </div>
    <div class="input-wrapper">
      <input
        type="text"
        id="searchInput"
        class="input"
        placeholder="Search flags..."
        autocomplete="off"
        spellcheck="false"
      />
    </div>
    <div class="stats">
      <span class="stat">Total <span class="stat-value" id="totalCount">0</span></span>
      <span class="stat">Enabled <span class="stat-value" id="enabledCount">0</span></span>
      <span class="stat">Updated <span class="stat-value" id="lastUpdated">—</span></span>
    </div>
  </div>

  <div id="content" class="content">
    <div class="empty">
      <div class="empty-title">No flags yet</div>
      <div class="empty-description">
        Navigate to a page with LaunchDarkly to see feature flags
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Copied!</div>

  <script src="popup.js"></script>
</body>
</html>
